---
default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit, manual]
minimum_pre_commit_version: 3.5.0
fail_fast: true
repos:
  - repo: local
    # this hook is not intended to be run on github
    # it just allows to generate the same pre-commit
    # file with some specific option to github
    hooks:
      - id: preCommitGeneration
        name: preCommitGeneration
        entry: .github/preCommitGeneration.sh
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true
        stages: [pre-commit, pre-push, manual]
      - id: v8r
        name: v8r
        entry: npx -y v8r --ci .v8rrc.yaml
        language: system
        pass_filenames: true
        stages: [pre-commit, pre-push]
        files: |
          (?x)(
            \.(yaml|yml|json)$
          )
        exclude: |
          (?x)(
            ^\.?secretlintrc\.yml$|
            ^\.vscode/|
            ^configs/site-config\.yaml$|
            ^conf/postmanCli/MongoDbData/.*\.json$|
            ^conf/postmanCli/openApis.json$|
            ^conf/postmanCli/GithubAPI/.*\.json$|
            ^\.?checkov\.yml$|
            ^\.?secretlintrc\.json$|
            ^\.?grype\.yaml$|
            ^\.?trivy\.yaml$|
            ^\.proselintrc.json$|
            ^package\.json$|
            /testsData/|
            \.schema\.json$
          )
      - id: cspell
        name: cspell
        entry: npx -y cspell .
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push, manual]

  - repo: https://github.com/executablebooks/mdformat
    # Do this before other tools "fixing" the line endings
    rev: 0.7.22
    hooks:
      - id: mdformat
        name: Format Markdown
        entry: mdformat # Executable to run, with fixed options
        language: python
        types: [markdown]
        args: [--wrap, '120', --number]
        additional_dependencies:
          - mdformat-frontmatter
          - mdformat-toc
          - mdformat-shfmt
          - mdformat-tables
          - mdformat-config
          - mdformat-web
          - mdformat-gfm
        exclude: |
          (?x)(
            ^\.github/|
            ^doc/ai/
          )

  - repo: https://github.com/jsh9/markdown-heading-numbering
    rev: 0.1.0
    hooks:
      - id: markdown-heading-numbering
        args:
          - --start-from-level=2
          - --initial-numbering=1
        exclude: |
          (?x)(
            ^\.github/|
            ^doc/ai/|
            AGENTS\.md|
            SKILL\.md
          )

  - repo: https://github.com/jsh9/markdown-toc-creator
    rev: 0.1.3
    hooks:
      - id: markdown-toc-creator
        args:
          - --proactive=False
          - --style=github
          - --quiet
          - --add-toc-title=False
          - --add-horizontal-rules=False
        exclude: |
          (?x)(
              ^\.github/
          )

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.47.0
    hooks:
      - id: markdownlint
        args: [--disable=MD041, --fix]
        exclude: |
          (?x)(
            ^\.github/|
            ^doc/ai/
          )

  - repo: local
    hooks:
      - id: install-requirements
        name: install-requirements
        entry: bash -c './bin/installRequirements'
        language: system
        always_run: true
        pass_filenames: false
        require_serial: true
        fail_fast: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: mixed-line-ending
      - id: end-of-file-fixer
        exclude: |
          (?x)(
            .svg$|
            ^src\/Postman\/Model\/testsData\/pullMode\/GithubAPI\/notWritableFile.json$
          )
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-xml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: fix-byte-order-marker
      - id: check-yaml
      - id: trailing-whitespace
        exclude: |
          (?x)(
            testsData/
          )
        stages: [pre-commit, pre-push, manual]
      - id: check-added-large-files
      - id: forbid-new-submodules
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: file-contents-sorter
        files: .cspell/.*\.txt
        args: [--ignore-case]
        stages: [pre-commit, pre-push, manual]
      - id: check-json
        # x modifier: extended. Spaces and text after a # in the pattern are ignored
        exclude: |
          (?x)^(
            \.vscode\/.*\.json$|
            src\/Postman\/Collection\/testsData\/postmanCollections_invalidJsonFile.json$|
            src\/Postman\/Model\/testsData\/pushMode\/GithubAPI\/notValidJsonFile.json$|
            src\/Postman\/Model\/testsData\/getCollectionInvalid.json$|
            src\/Postman\/Model\/testsData\/pullMode\/GithubAPI\/notWritableFile.json$
          )

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint
        stages: [pre-commit, pre-push, manual]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args:
          - --dictionary
          - '-'
          - --dictionary
          - .cspell/codespellrc-dic.txt
          - --ignore-words
          - .cspell/codespellrc-ignore.txt
          - --quiet-level
          - '2'
          - --interactive
          - '0'
          - --check-filenames
          - --check-hidden
          - --write-changes
        exclude: >
          (?x)(
              ^installScripts/|
              ^bin/|
              ^install$|
              ^distro$|
              ^srcAlt|
              ^.cspell/codespellrc-.*.txt$
          )

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.1
    hooks:
      - id: prettier
        exclude: |
          (?x)(
            ^src\/Postman\/Collection\/testsData\/postmanCollections_invalidJsonFile.json$|
            ^src\/Postman\/Model\/testsData\/getCollectionInvalid.json$|
            ^src\/Postman\/Model\/testsData\/pushMode\/GithubAPI\/notValidJsonFile.json$|
            ^\.github/
          )

  - repo: https://github.com/fchastanet/jumanjihouse-pre-commit-hooks
    rev: 3.0.2
    hooks:
      - id: shfmt
        args: [-i, '2', -ci]
        # x modifier: extended. Spaces and text after a # in the pattern are ignored
        exclude: |
          (?x)(
            ^vendor/|
            ^bin/|
            \.tpl$|
            /testsData/|
            ^conf/dbScripts/|
            ^install
          )

      # Check both committed and uncommitted files for git conflict
      # markers and whitespace errors according to core.whitespace
      # and conflict-marker-size configuration in a git repo.
      - id: git-check
        exclude: /testsData/

  - repo: https://github.com/fchastanet/bash-tools-framework
    rev: 6.2.5
    hooks:
      - id: fixShebangExecutionBit
      - id: awkLint
      - id: shellcheckLint
      - id: shellcheckLintGithubAction
      - id: frameworkLint
        args: [--expected-warnings-count, '5', --format, plain, --theme, default-force, --display-level, WARNING]
      - id: frameworkLintGithubAction
        args: [--expected-warnings-count, '5', --format, checkstyle, --theme, default-force, --display-level, WARNING]
      - id: plantuml
        args: [--same-dir, -f, png, -f, svg, --limit-size, '1200']
        exclude: |
          (?x)(
            ^conf/mysql2pumlSkins/default.puml$|
            ^src/_binaries/Converters/mysql2puml/testsData/mysql2pumlSkins/default.puml$
          )

  - repo: local
    hooks:
      - id: buildDocFilesForGithubActions
        name: build doc files for github actions
        language: script
        entry: bin/doc
        args: [--ci, --verbose]
        pass_filenames: false
        require_serial: true
        stages: [] # GITHUB

  - repo: https://github.com/fchastanet/bash-compiler
    rev: 3.2.1
    hooks:
      - id: buildBashBinaries
